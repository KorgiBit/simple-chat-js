<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>мини чат</title>
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen" class="join-screen">
        <h1>Мини чат</h1>
        <p class="join-subtitle">Войдите в аккаунт</p>
        <input type="text" id="loginUsername" placeholder="Ваш ник" maxlength="20">
        <input type="password" id="loginPassword" placeholder="Ваш пароль" maxlength="20">
        <p id="loginError" class="error-text hidden"></p>
        <button id="loginButton">Войти в чат</button>
        <button id="goToRegisterButton" class="link-button">Нет аккаунта? Зарегистрироваться</button>
    </div>

    <div id="registerScreen" class="join-screen hidden">
        <h1>Регистрация</h1>
        <p class="join-subtitle">Создайте аккаунт</p>
        <input type="text" id="regUsername" placeholder="Ваш ник (мин 3 символа)" maxlength="20">
        <input type="password" id="regPassword" placeholder="Ваш пароль (мин 4 символа)" maxlength="20">
        <p id="regError" class="error-text hidden"></p>
        <button id="regSubmitButton">Зарегистрироваться</button>
        <button id="goToLoginButton" class="link-button">Уже есть аккаунт? Войти</button>
    </div>

    <div id="chatScreen" class="chat-screen hidden">
        <header class="chat-header">
            <h1>Мини чат</h1>
            <div class="header-right">
                <span id="currentUser" class="current-user"></span>
                <button id="logoutButton" class="logout-button">Выйти</button>
            </div>
        </header>
        <div class="chat-body">
            <aside class="sidebar">
                <h3>Онлайн: <span id="onlineCount">0</span></h3>
                <ul id="onlineList"></ul>
            </aside>
            <div class="chat-main">
                <ul id="messages"></ul>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="напиши чего-нибудь">
                    <button id="sendButton">Отправить</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
